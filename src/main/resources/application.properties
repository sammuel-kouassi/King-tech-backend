spring.application.name=king-tech-backend

# --- CONFIGURATION BASE DE DONNEES ---
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Utilisation du mode pooler pour Supabase (plus stable en ligne)
spring.datasource.url=jdbc:postgresql://aws-1-eu-west-1.pooler.supabase.com:6543/postgres?prepareThreshold=0
spring.datasource.username=postgres.uirxdeqrmmgeloofxpjj
spring.datasource.password=${DB_PASSWORD}

# --- HIBERNATE ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.type.json_format_mapper=org.hibernate.type.format.jackson.JacksonJsonFormatMapper

# --- CONFIGURATION EMAIL (CORRIG…E POUR RENDER) ---
# Le port 465 (SSL) est beaucoup plus stable sur les serveurs distants que le 587
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=sammuel.kouassi2026@gmail.com
# Assure-toi que cette variable contient ton "Mot de passe d'application" Google de 16 lettres
spring.mail.password=${EMAIL_PASSWORD}

# ParamŤtres de sťcuritť SSL pour le port 465
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.socketFactory.port=465
spring.mail.properties.mail.smtp.socketFactory.class=javax.net.ssl.SSLSocketFactory

# Forcer l'IPv4 pour ťviter les "Operation timed out" sur Render
# (Optionnel mais fortement recommandť pour Gmail)
java.net.preferIPv4Stack=true